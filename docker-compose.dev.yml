# ── Desarrollo con hot-reload ───────────────────────────────
# Uso: docker compose -f docker-compose.dev.yml up

services:
  frontend:
    image: node:20-alpine
    container_name: woven-frontend-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev
